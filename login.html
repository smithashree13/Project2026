<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nilrise Pharma</title>
    <style>
        body {
            background: linear-gradient(135deg, #79d49d, #cfdef3);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        
        .login-container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            box-sizing: border-box;
            text-align: center;
        }

     

        h1 {
            color: #333333;
            margin-bottom: 30px;
            font-size: 24px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

       

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #df6666;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2);
            outline: none;
        }
    }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        input[type="submit"],
        input[type="reset"] {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        input[type="submit"] {
            background-color: #39d05f;
            color: white;
        }

        input[type="submit"]:hover {
            background-color: #357abd;
        }

        input[type="reset"] {
            background-color: #e0e0e0;
            color: #333333;
        }

        input[type="reset"]:hover {
            background-color: #d5d5d5;
        }
        
        input[type="submit"]:active,
        input[type="reset"]:active {
            transform: scale(0.98);
        }

        footer {
            background-color: #a45151;
            color: #ece8f2;
            text-align: center;
            padding: 15px;
            font-size: 12px;
        }

        footer p {
            margin: 4px 0;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <main>
        <div class="login-container">
            <div class="logo-wrapper">
                <img src="image.png" alt="Logo" width="100">
            </div>
            
            <h1>Welcome Back</h1>
            
            <form onsubmit="validate(); return false;">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                
                <div class="button-group">
                    <input type="submit" value="Login">
                    <input type="reset" value="Reset" onclick="resetForm()">
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Nilrise Pharma. All rights reserved.</p>
    </footer>

    <script>
        function resetForm() {
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
        }

        function validate() {
            var username = document.getElementById("username").value.trim();
            var password = document.getElementById("password").value;
            
            if (username === "admin" && password === "vb14") {
                alert("Hello, welcome to Nilrise Pharma!");
                location.replace("file.html");
            } else {
                alert("Invalid username or password. Please try again.");
            }
        }
    </script>
</body>
</html>
